name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Initialise liteparser submodule
        # scripts/bench-compare.ts statically imports
        # ../vendor/liteparser/wasm/src/index.ts, so tsc needs those
        # files on disk.  The other vendored submodules (upstream
        # SQLite, lemon-rs) aren't referenced by type-checked code.
        run: git submodule update --init --depth=1 vendor/liteparser

      - name: Install mise tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: v2026.4.8

      - run: bun install --frozen-lockfile --ignore-scripts

      - run: bun run fmt --check
      - run: bun run typecheck
      - run: bun run build
      - name: Verify tracked files are unchanged after build
        run: git diff --exit-code
      - run: bun run test

      - name: Rule coverage
        # Re-run the suite with v8 coverage instrumentation and map
        # DA hits back to Lemon rule ids.  Non-gating for now; see
        # scripts/rule-coverage.ts and the --no-fail flag.  Once the
        # corpus is filled out, drop --no-fail or snapshot rules.json
        # and gate on regression.
        run: |
          bun test --coverage --coverage-reporter=lcov --path-ignore-patterns='vendor/**'
          bun scripts/rule-coverage.ts --no-fail --json coverage/rules.json | tee coverage/summary.txt
          {
            echo "## Rule coverage"
            echo ""
            echo '```'
            cat coverage/summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: coverage
          path: coverage/
          if-no-files-found: warn

      - name: npm pack
        run: |
          mkdir -p build/npm
          npm pack --pack-destination build/npm

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-package
          path: build/npm/*.tgz
          if-no-files-found: error

  dist-test:
    name: Test npm package
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Install mise tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: v2026.4.8
          install_args: node npm

      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-package
          path: dist-test/artifacts

      - name: Install artifact
        working-directory: dist-test
        shell: bash
        run: |
          package_tarball="$(echo ./artifacts/*.tgz)"
          npm install "$package_tarball"

      - name: Test artifact
        working-directory: dist-test
        shell: bash
        run: npm test

  bench:
    name: Bench (${{ matrix.runtime }})
    runs-on: ubuntu-latest
    needs: build
    # Benches are informational — don't fail the build on a regression,
    # but do upload the markdown output so it's easy to compare runs.
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        runtime: [node, bun]

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Install mise tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: v2026.4.8
          install_args: node npm bun

      - name: Download artifact
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-package
          path: dist-test/artifacts

      - name: Install artifact + bench deps
        working-directory: dist-test
        shell: bash
        run: |
          package_tarball="$(echo ./artifacts/*.tgz)"
          npm install "$package_tarball"

      - name: Run bench (${{ matrix.runtime }})
        working-directory: dist-test
        shell: bash
        run: |
          if [ "${{ matrix.runtime }}" = "bun" ]; then
            npm run bench:bun -- --md | tee bench.md
          else
            npm run bench -- --md | tee bench.md
          fi

      - name: Run bench:compare (${{ matrix.runtime }})
        working-directory: dist-test
        shell: bash
        run: |
          if [ "${{ matrix.runtime }}" = "bun" ]; then
            npm run bench:compare:bun -- --md | tee bench-compare.md
          else
            npm run bench:compare -- --md | tee bench-compare.md
          fi

      - name: Append bench output to job summary
        working-directory: dist-test
        shell: bash
        run: |
          {
            echo "## Bench (${{ matrix.runtime }})"
            echo ""
            cat bench.md
            echo ""
            echo "## Bench:compare (${{ matrix.runtime }})"
            echo ""
            cat bench-compare.md
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload bench output
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bench-${{ matrix.runtime }}
          path: |
            dist-test/bench.md
            dist-test/bench-compare.md
          if-no-files-found: warn

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: dist-test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.repository == 'justjake/sqlite3-parser-js'
    concurrency:
      group: npm-publish-${{ github.repository }}-${{ github.ref_name }}
      cancel-in-progress: false
    environment: npm-publish
    permissions:
      contents: write
      id-token: write # npm trusted publishing via GitHub OIDC

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0

      - name: Install mise tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: v2026.4.8

      - name: Download npm Tarball
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-package
          path: build/npm

      - name: Plan Publish
        id: publish_plan
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          package_tarball="$(echo ./build/npm/*.tgz)"
          short_sha="${GITHUB_SHA::7}"

          emit() {
            {
              echo "mode=$1"
              echo "name=${package_name}"
              echo "version=$2"
              echo "tarball=$3"
              echo "url=https://www.npmjs.com/package/${package_name}/v/$2"
            } >> "$GITHUB_OUTPUT"
          }

          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            next_version="$(node -e "
              const base = process.argv[1]
              const sha = process.argv[2]
              const dash = base.indexOf('-')
              if (dash === -1) {
                process.stdout.write(base + '-next.' + sha)
              } else {
                process.stdout.write(base + '.sha.' + sha)
              }
            " "$package_version" "$short_sha")"

            if npm view "${package_name}@${next_version}" version >/dev/null 2>&1; then
              emit skip "${next_version}" "${package_tarball}"
              echo "Version ${next_version} is already published; skipping publish."
            else
              emit next "${next_version}" "${package_tarball}"
              echo "Package version ${package_version} already exists; will publish ${next_version} with dist-tag next."
            fi
          else
            emit stable "${package_version}" "${package_tarball}"
            echo "Package version ${package_version} is new; will publish it to latest."
          fi

      - name: Prepare next tarball
        id: prepare_next
        if: steps.publish_plan.outputs.mode == 'next'
        run: |
          rm -rf publish
          rm -rf npm-next
          mkdir -p publish
          mkdir -p npm-next
          tar -xzf "${{ steps.publish_plan.outputs.tarball }}" -C publish
          node -e "
            const fs = require('node:fs')
            const path = require('node:path')
            const file = path.join(process.cwd(), 'publish', 'package', 'package.json')
            const pkg = JSON.parse(fs.readFileSync(file, 'utf8'))
            pkg.version = process.argv[1]
            fs.writeFileSync(file, JSON.stringify(pkg, null, 2) + '\n')
          " "${{ steps.publish_plan.outputs.version }}"
          npm pack ./publish/package --pack-destination npm-next
          echo "tarball=$(echo ./npm-next/*.tgz)" >> "$GITHUB_OUTPUT"

      - name: Validate release tag
        if: steps.publish_plan.outputs.mode == 'stable'
        run: |
          tag="v${{ steps.publish_plan.outputs.version }}"

          if git rev-parse --verify "refs/tags/${tag}" >/dev/null 2>&1; then
            tag_commit="$(git rev-list -n 1 "${tag}")"
            if [ "${tag_commit}" != "${GITHUB_SHA}" ]; then
              echo "Tag ${tag} already exists on ${tag_commit}, not ${GITHUB_SHA}."
              exit 1
            fi
          fi

      - name: Publish stable version
        if: steps.publish_plan.outputs.mode == 'stable'
        env:
          PACKAGE_NAME: ${{ steps.publish_plan.outputs.name }}
          PACKAGE_VERSION: ${{ steps.publish_plan.outputs.version }}
          PACKAGE_URL: ${{ steps.publish_plan.outputs.url }}
        run: |
          npm publish "${{ steps.publish_plan.outputs.tarball }}" --tag latest --access public
          echo "Published ${PACKAGE_URL}"
          echo "::notice title=Published ${PACKAGE_NAME}@${PACKAGE_VERSION}::${PACKAGE_URL}"
          {
            echo "### Published \`${PACKAGE_NAME}@${PACKAGE_VERSION}\` (tag: latest)"
            echo ""
            echo "[${PACKAGE_URL}](${PACKAGE_URL})"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Publish next version
        if: steps.publish_plan.outputs.mode == 'next'
        env:
          PACKAGE_NAME: ${{ steps.publish_plan.outputs.name }}
          PACKAGE_VERSION: ${{ steps.publish_plan.outputs.version }}
          PACKAGE_URL: ${{ steps.publish_plan.outputs.url }}
        run: |
          npm publish "${{ steps.prepare_next.outputs.tarball }}" --tag next --access public
          echo "Published ${PACKAGE_URL}"
          echo "::notice title=Published ${PACKAGE_NAME}@${PACKAGE_VERSION}::${PACKAGE_URL}"
          {
            echo "### Published \`${PACKAGE_NAME}@${PACKAGE_VERSION}\` (tag: next)"
            echo ""
            echo "[${PACKAGE_URL}](${PACKAGE_URL})"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Report skip
        if: steps.publish_plan.outputs.mode == 'skip'
        env:
          PACKAGE_NAME: ${{ steps.publish_plan.outputs.name }}
          PACKAGE_VERSION: ${{ steps.publish_plan.outputs.version }}
          PACKAGE_URL: ${{ steps.publish_plan.outputs.url }}
        run: |
          echo "Skipped publish: ${PACKAGE_NAME}@${PACKAGE_VERSION} already exists at ${PACKAGE_URL}"
          echo "::notice title=Skipped publish (already on npm)::${PACKAGE_URL}"
          {
            echo "### Skipped publish: \`${PACKAGE_NAME}@${PACKAGE_VERSION}\` already on npm"
            echo ""
            echo "[${PACKAGE_URL}](${PACKAGE_URL})"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Create release tag
        if: steps.publish_plan.outputs.mode == 'stable'
        run: |
          tag="v${{ steps.publish_plan.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git rev-parse --verify "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists on this commit; skipping push."
            exit 0
          fi

          git tag "${tag}"
          git push origin "refs/tags/${tag}"
