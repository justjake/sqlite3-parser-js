name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Install mise tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: v2026.4.8

      - run: bun install --frozen-lockfile --ignore-scripts

      - run: bun run fmt --check
      - run: bun run typecheck
      - run: bun run build
      - name: Verify tracked files are unchanged after build
        run: git diff --exit-code
      - run: bun run test

      - name: npm pack
        run: |
          mkdir -p build/npm
          npm pack --pack-destination build/npm

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: npm-package
          path: build/npm/*.tgz
          if-no-files-found: error

  publish:
    name: Publish
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && github.repository == 'justjake/sqlite3-parser-js'
    concurrency:
      group: npm-publish-${{ github.repository }}-${{ github.ref_name }}
      cancel-in-progress: false
    environment: npm-publish
    permissions:
      contents: write
      id-token: write # npm trusted publishing via GitHub OIDC

    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          fetch-depth: 0

      - name: Install mise tools
        uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          version: v2026.4.8

      - name: Download npm Tarball
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: npm-package
          path: build/npm

      - name: Plan Publish
        id: publish_plan
        run: |
          package_name="$(node -p "require('./package.json').name")"
          package_version="$(node -p "require('./package.json').version")"
          package_tarball="$(echo ./build/npm/*.tgz)"
          short_sha="${GITHUB_SHA::7}"

          if npm view "${package_name}@${package_version}" version >/dev/null 2>&1; then
            next_version="$(node -e "
              const base = process.argv[1]
              const sha = process.argv[2]
              const dash = base.indexOf('-')
              if (dash === -1) {
                process.stdout.write(base + '-next.' + sha)
              } else {
                process.stdout.write(base + '.sha.' + sha)
              }
            " "$package_version" "$short_sha")"

            if npm view "${package_name}@${next_version}" version >/dev/null 2>&1; then
              echo "mode=skip" >> "$GITHUB_OUTPUT"
              echo "version=${next_version}" >> "$GITHUB_OUTPUT"
              echo "tarball=${package_tarball}" >> "$GITHUB_OUTPUT"
              echo "Version ${next_version} is already published; skipping publish."
            else
              echo "mode=next" >> "$GITHUB_OUTPUT"
              echo "version=${next_version}" >> "$GITHUB_OUTPUT"
              echo "tarball=${package_tarball}" >> "$GITHUB_OUTPUT"
              echo "Package version ${package_version} already exists; will publish ${next_version} with dist-tag next."
            fi
          else
            echo "mode=stable" >> "$GITHUB_OUTPUT"
            echo "version=${package_version}" >> "$GITHUB_OUTPUT"
            echo "tarball=${package_tarball}" >> "$GITHUB_OUTPUT"
            echo "Package version ${package_version} is new; will publish it to latest."
          fi

      - name: Prepare next tarball
        id: prepare_next
        if: steps.publish_plan.outputs.mode == 'next'
        run: |
          rm -rf publish
          rm -rf npm-next
          mkdir -p publish
          mkdir -p npm-next
          tar -xzf "${{ steps.publish_plan.outputs.tarball }}" -C publish
          node -e "
            const fs = require('node:fs')
            const path = require('node:path')
            const file = path.join(process.cwd(), 'publish', 'package', 'package.json')
            const pkg = JSON.parse(fs.readFileSync(file, 'utf8'))
            pkg.version = process.argv[1]
            fs.writeFileSync(file, JSON.stringify(pkg, null, 2) + '\n')
          " "${{ steps.publish_plan.outputs.version }}"
          npm pack ./publish/package --pack-destination npm-next
          echo "tarball=$(echo ./npm-next/*.tgz)" >> "$GITHUB_OUTPUT"

      - name: Validate release tag
        if: steps.publish_plan.outputs.mode == 'stable'
        run: |
          tag="v${{ steps.publish_plan.outputs.version }}"

          if git rev-parse --verify "refs/tags/${tag}" >/dev/null 2>&1; then
            tag_commit="$(git rev-list -n 1 "${tag}")"
            if [ "${tag_commit}" != "${GITHUB_SHA}" ]; then
              echo "Tag ${tag} already exists on ${tag_commit}, not ${GITHUB_SHA}."
              exit 1
            fi
          fi

      - name: Publish stable version
        if: steps.publish_plan.outputs.mode == 'stable'
        run: npm publish "${{ steps.publish_plan.outputs.tarball }}" --tag latest --access public

      - name: Publish next version
        if: steps.publish_plan.outputs.mode == 'next'
        run: npm publish "${{ steps.prepare_next.outputs.tarball }}" --tag next --access public

      - name: Create release tag
        if: steps.publish_plan.outputs.mode == 'stable'
        run: |
          tag="v${{ steps.publish_plan.outputs.version }}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git rev-parse --verify "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists on this commit; skipping push."
            exit 0
          fi

          git tag "${tag}"
          git push origin "refs/tags/${tag}"
